name: Bug Report
description: Report a bug (crashes, errors, unexpected behavior)
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

        **Note:** If this is a parsing quality issue (incorrect text, bad formatting), please use the "Parsing Issue" template instead.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Run `lit parse ...`
        2. See error
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error Message
      description: The full error message or stack trace
      render: text
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: LiteParse Version
      description: Run `lit --version` to get this
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js Version
      description: Run `node --version` to get this
      placeholder: "v20.0.0"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information
